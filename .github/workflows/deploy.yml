# ============================================================================
# LARAVEL ECHO SYSTEM CI/CD PIPELINE WITH VUE.JS FRONTEND
# ============================================================================
# Author: Senior DevOps Engineer
# Version: 2.0
# Last Updated: 2024
#
# This pipeline handles:
# - Laravel Echo Server (WebSocket) configuration
# - Vue.js frontend with real-time capabilities
# - Laravel Reverb/Horizon integration
# - Broadcasting events validation
# - WebSocket connection testing
# ============================================================================

name: 🟢 Laravel Vue Echo CI/CD

# ----------------------------------------------------------------------------
# TRIGGER EVENTS
# ----------------------------------------------------------------------------
on:
  push:
    branches:
      - develop
      - feature/*
      - staging
      - main
      - hotfix/*
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - '.gitignore'
      
  pull_request:
    branches:
      - develop
      - staging
      - main
    types: [opened, synchronize, reopened, ready_for_review]
    paths-ignore:
      - '*.md'
      - 'docs/**'

  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment Environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      skip_tests:
        description: 'Skip tests? (Emergency only)'
        required: false
        default: false
        type: boolean

# ----------------------------------------------------------------------------
# ENVIRONMENT VARIABLES
# ----------------------------------------------------------------------------
env:
  # PHP Configuration
  PHP_VERSION: '8.3'
  
  # Node.js Configuration
  NODE_VERSION: '20'
  
  # Laravel Configuration
  APP_ENV: testing
  APP_DEBUG: false
  
  # Database Configuration
  DB_CONNECTION: mysql
  
  # Redis Configuration (Required for Echo)
  REDIS_CLIENT: predis
  
  # Broadcasting Configuration
  BROADCAST_DRIVER: redis
  QUEUE_CONNECTION: redis
  
  # Echo Server Configuration
  ECHO_SERVER_PORT: 6001
  ECHO_PROTOCOL: http
  ECHO_HOST: localhost

# ----------------------------------------------------------------------------
# JOBS
# ----------------------------------------------------------------------------

# ============================================================================
# JOB 1: CODE QUALITY & STATIC ANALYSIS
# ============================================================================
  code-quality:
    name: "1️⃣ Code Quality & Static Analysis"
    runs-on: ubuntu-latest, self-hosted
    timeout-minutes: 15
    
    steps:
      - name: "📥 Checkout Code"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for better analysis

      - name: "🐘 Setup PHP ${{ env.PHP_VERSION }}"
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, pdo, pdo_mysql, redis, pcntl, posix, sockets
          tools: composer:v2, php-cs-fixer, phpstan, phpcpd
          coverage: none

      # Cache composer dependencies
      - name: "📦 Cache Composer Dependencies"
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: "🔧 Install PHP Dependencies"
        run: |
          composer install \
            --prefer-dist \
            --no-progress \
            --no-interaction \
            --no-scripts

      # STEP 1: PHP Syntax Validation
      - name: "✅ PHP Syntax Validation"
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🔍 STEP 1: Validating PHP Syntax"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          
          # Find all PHP files excluding vendor and cache
          find . -type f -name "*.php" \
            -not -path "./vendor/*" \
            -not -path "./storage/*" \
            -not -path "./bootstrap/cache/*" \
            -not -path "./node_modules/*" \
            -print0 | while IFS= read -r -d '' file; do
            
            # Check syntax
            if ! php -l "$file" > /dev/null 2>&1; then
              echo "❌ Syntax error in: $file"
              php -l "$file"
              FAILED=true
            fi
          done
          
          if [ "$FAILED" = true ]; then
            echo "❌ PHP syntax errors found"
            exit 1
          fi
          
          echo "✅ All PHP files pass syntax validation"

      # STEP 2: Code Style Check with Laravel Pint
      - name: "🎨 Code Style Validation (Laravel Pint)"
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🎨 STEP 2: Checking Code Style"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          
          if [ -f "./vendor/bin/pint" ]; then
            echo "Using Laravel Pint for code style checking..."
            ./vendor/bin/pint --test --format=json > pint-report.json || {
              echo "❌ Code style issues found. Run './vendor/bin/pint' to fix."
              cat pint-report.json
              exit 1
            }
            echo "✅ Code style is perfect!"
          else
            echo "⚠️ Laravel Pint not installed. Installing..."
            composer require --dev laravel/pint --no-interaction
            ./vendor/bin/pint --test
          fi

      # STEP 3: Static Analysis with Larastan (PHPStan for Laravel)
      - name: "🔬 Static Code Analysis (Larastan)"
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🔬 STEP 3: Static Code Analysis"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          
          if [ -f "./vendor/bin/phpstan" ]; then
            echo "Running Larastan/PHPStan analysis..."
            
            # Check if phpstan.neon exists, if not create default
            if [ ! -f "phpstan.neon" ]; then
              echo "Creating default PHPStan configuration..."
              cat > phpstan.neon << 'EOF'
              parameters:
                  level: 5
                  paths:
                      - app/
                      - database/
                      - routes/
                  excludePaths:
                      - vendor/
                      - storage/
                      - tests/
                  checkMissingIterableValueType: false
      EOF
      fi
            
            ./vendor/bin/phpstan analyse \
              --configuration=phpstan.neon \
              --memory-limit=512M \
              --error-format=table || {
                echo "⚠️ Static analysis found issues"
                exit 1
              }
            echo "✅ Static analysis passed"
          else
            echo "📦 Installing Larastan..."
            composer require --dev nunomaduro/larastan:^2.0 --no-interaction
            echo "ℹ️ Larastan installed. Run analysis on next commit."
fi

      # STEP 4: Composer Security Audit
      - name: "🔒 Security Vulnerability Scan"
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🔒 STEP 4: Security Scan"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          
          echo "Checking for known vulnerabilities..."
          composer audit --format=json > composer-audit.json || {
            echo "⚠️ Security vulnerabilities found!"
            cat composer-audit.json
            # Don't fail the build, but warn
          }
          
          # Check for outdated packages
          echo "Checking for outdated packages..."
          composer outdated --direct --format=json > composer-outdated.json || true
          
          echo "✅ Security scan completed"
          
      # Upload quality reports
      - name: "📊 Upload Quality Reports"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: code-quality-reports-vue
          path: |
            pint-report.json
            composer-audit.json
            composer-outdated.json
            phpstan.neon
          retention-days: 7

# ============================================================================
# JOB 2: DATABASE & ECHO SERVER VALIDATION
# ============================================================================
  database-echo-validation:
    name: "2️⃣ Database & Echo Server Validation"
    runs-on: ubuntu-latest
    needs: code-quality
    timeout-minutes: 20
    
    services:
      # MySQL Service
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: testing
          MYSQL_ROOT_PASSWORD: root_password
          MYSQL_ROOT_HOST: '%'
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -proot_password"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
      
      # Redis Service (Required for Laravel Echo)
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      APP_ENV: testing
      APP_KEY: base64:testkeyforcicd/DONOTUSEINPRODUCTIONabc123==
      APP_URL: http://localhost
      DB_CONNECTION: mysql
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_DATABASE: testing
      DB_USERNAME: root
      DB_PASSWORD: root_password
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      BROADCAST_DRIVER: redis
      CACHE_DRIVER: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis

    steps:
      - name: "📥 Checkout Code"
        uses: actions/checkout@v4

      - name: "🐘 Setup PHP"
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, pdo, pdo_mysql, redis, pcntl, posix, sockets
          tools: composer:v2
          coverage: none

      - name: "📦 Cache Dependencies"
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: "🔧 Install Dependencies"
        run: |
          composer install \
            --prefer-dist \
            --no-progress \
            --no-interaction

      # STEP 5: Environment Setup
      - name: "⚙️ Configure Laravel Environment"
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "⚙️ STEP 5: Configuring Laravel Environment"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          
          # Create .env file for testing
          cp .env.example .env.testing || cp .env .env.testing
          
          # Generate application key
          php artisan key:generate --env=testing
          
          echo "✅ Environment configured"

      # STEP 6: Database Migration Validation
      - name: "🗄️ Database Migration Validation"
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🗄️ STEP 6: Validating Migrations"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          
          # Check if Redis is running
          echo "Checking Redis connection..."
          redis-cli -h localhost -p 6379 ping | grep PONG && echo "✅ Redis is running"
          
          # Check MySQL connection
          echo "Checking MySQL connection..."
          mysqladmin ping -h 127.0.0.1 -u root -proot_password
          
          # Run migrations
          echo "Running database migrations..."
          php artisan migrate:fresh --force --env=testing
          
          # Check migration status
          echo "Verifying migration status..."
          php artisan migrate:status --env=testing
          
          echo "✅ Migrations validated successfully"

      # STEP 7: Database Seeder Validation
      - name: "🌱 Database Seeder Validation"
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🌱 STEP 7: Validating Seeders"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          
          # Run database seeders
          php artisan db:seed --force --env=testing
          
          # If you have specific seeders for testing
          if [ -f "database/seeders/TestDataSeeder.php" ]; then
            php artisan db:seed --class=TestDataSeeder --force --env=testing
          fi
          
          echo "✅ Seeders executed successfully"

      # STEP 8: Echo Server Configuration Validation
      - name: "🔊 Laravel Echo Configuration Validation"
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🔊 STEP 8: Echo Server Configuration"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          
          # Check broadcasting configuration
          echo "Checking broadcasting configuration..."
          php artisan tinker --execute="echo config('broadcasting.default');"
          
          # Check if broadcasting service provider is registered
          if grep -q "BroadcastServiceProvider" config/app.php; then
            echo "✅ BroadcastServiceProvider is registered"
          else
            echo "⚠️ BroadcastServiceProvider not found in config/app.php"
          fi
          
          # Check channels routes
          if [ -f "routes/channels.php" ]; then
            echo "✅ Channel routes file exists"
          else
            echo "⚠️ routes/channels.php not found"
          fi
          
          # Validate Echo related packages
          echo "Checking Echo dependencies..."
          composer show | grep -E "pusher|laravel-echo|laravel-reverb" && echo "✅ Echo packages installed"
          
          # Check events directory
          if [ -d "app/Events" ]; then
            echo "✅ Events directory exists"
            count=$(find app/Events -name "*.php" | wc -l)
            echo "   Found $count event files"
          else
            echo "ℹ️ No Events directory found. Create events using: php artisan make:event"
          fi
          
          echo "✅ Echo configuration validated"

# ============================================================================
# JOB 3: AUTOMATED TESTING
# ============================================================================
  automated-tests:
    name: "3️⃣ Automated Testing"
    runs-on: ubuntu-latest
    needs: database-echo-validation
    timeout-minutes: 30
    
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: testing
          MYSQL_ROOT_PASSWORD: root_password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -proot_password"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
      
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      APP_ENV: testing
      APP_KEY: base64:testkeyforcicd/DONOTUSEINPRODUCTIONabc123==
      DB_CONNECTION: mysql
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_DATABASE: testing
      DB_USERNAME: root
      DB_PASSWORD: root_password
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      BROADCAST_DRIVER: redis
      QUEUE_CONNECTION: sync
      CACHE_DRIVER: redis
      SESSION_DRIVER: redis

    steps:
      - name: "📥 Checkout Code"
        uses: actions/checkout@v4

      - name: "🐘 Setup PHP"
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, pdo, pdo_mysql, redis, pcntl, posix, sockets
          coverage: xdebug
          tools: composer:v2

      # Setup Node.js for Vue.js
      - name: "🟢 Setup Node.js for Vue.js"
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          
      - name: "📦 Cache NPM Dependencies"
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: "📦 Cache Composer Dependencies"
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: "🔧 Install PHP Dependencies"
        run: |
          composer install \
            --prefer-dist \
            --no-progress \
            --no-interaction

      - name: "🔧 Install Vue.js Frontend Dependencies"
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📦 Installing Vue.js Dependencies"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          
          # Clean install
          npm ci
          
          # Check Vue.js specific packages
          echo "Checking Vue.js packages..."
          npm list vue@3 vue-router@4 pinia 2>/dev/null || echo "⚠️ Some Vue packages may be missing"
          
          # Check Laravel Echo client
          npm list laravel-echo 2>/dev/null || echo "⚠️ laravel-echo package not found"
          
          # Check Pusher client (for Echo)
          npm list pusher-js 2>/dev/null || echo "ℹ️ pusher-js not found (optional for Echo)"
          
          echo "✅ Frontend dependencies installed"

      - name: "⚙️ Prepare Laravel Application"
        run: |
          echo "Preparing Laravel for testing..."
          cp .env.example .env || true
          php artisan key:generate
          php artisan storage:link || true
          php artisan config:clear
          php artisan migrate:fresh --force --seed
          
          # Publish Echo configuration if exists
          php artisan vendor:publish --tag=laravel-echo-config || true
          
          echo "✅ Application prepared"

      # STEP 9: Unit Tests
      - name: "🧪 Unit Tests"
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🧪 STEP 9: Running Unit Tests"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          
          mkdir -p storage/test-results/unit
          
          # Run unit tests with coverage
          php artisan test \
            --testsuite=Unit \
            --parallel \
            --coverage-clover=storage/test-results/unit/coverage.xml \
            --log-junit=storage/test-results/unit/junit.xml \
            --order-by=random \
            --stop-on-failure
            
          echo "✅ Unit tests completed"

      # STEP 10: Feature Tests
      - name: "🧪 Feature Tests"
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🧪 STEP 10: Running Feature Tests"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          
          mkdir -p storage/test-results/feature
          
          # Run feature tests
          php artisan test \
            --testsuite=Feature \
            --parallel \
            --coverage-clover=storage/test-results/feature/coverage.xml \
            --log-junit=storage/test-results/feature/junit.xml
            
          echo "✅ Feature tests completed"

      # STEP 11: Broadcasting & Echo Tests
      - name: "🔊 Broadcasting & Echo Integration Tests"
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🔊 STEP 11: Broadcasting Tests"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          
          # Test if broadcasting is configured
          php artisan tinker --execute="
            try {
                echo 'Broadcast Driver: ' . config('broadcasting.default') . PHP_EOL;
                echo 'Redis Connected: ' . (Redis::connection()->ping() ? 'Yes' : 'No') . PHP_EOL;
            } catch (\Exception \$e) {
                echo 'Error: ' . \$e->getMessage() . PHP_EOL;
            }
          "
          
          # Run broadcasting specific tests if they exist
          if grep -r "EventFake\|broadcast" tests/ 2>/dev/null; then
            echo "Running broadcasting tests..."
            php artisan test --filter=Broadcast --env=testing || echo "⚠️ Some broadcast tests failed"
          else
            echo "ℹ️ No specific broadcasting tests found"
            echo "💡 TIP: Create broadcasting tests to verify real-time features"
          fi
          
          echo "✅ Broadcasting tests completed"

      # STEP 12: Vue.js Frontend Build & Test
      - name: "🎨 Vue.js Frontend Build & Test"
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🎨 STEP 12: Building Vue.js Frontend"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          
          # Build Vue.js assets
          echo "Building Vue.js production assets..."
          npm run build
          
          # Check if build succeeded
          if [ -d "public/build" ]; then
            echo "✅ Vue.js build successful"
            echo "Build output size:"
            du -sh public/build/
          else
            echo "❌ Vue.js build failed - public/build directory not found"
            exit 1
          fi
          
          # Run Vue.js unit tests if configured
          if grep -q "\"test:unit\"" package.json; then
            echo "Running Vue.js unit tests..."
            npm run test:unit -- --coverage || echo "⚠️ Vue unit tests failed"
          fi
          
          # Run Vue.js E2E tests if configured (Cypress/Nightwatch)
          if grep -q "\"test:e2e\"" package.json; then
            echo "Running Vue.js E2E tests..."
            npm run test:e2e || echo "⚠️ Vue E2E tests failed"
          fi
          
          # Check for TypeScript errors in Vue files
          if [ -f "tsconfig.json" ]; then
            echo "Checking TypeScript compilation..."
            npx vue-tsc --noEmit || echo "⚠️ TypeScript errors found in Vue files"
          fi
          
          # Lint Vue files
          if grep -q "\"lint\"" package.json; then
            echo "Linting Vue files..."
            npm run lint || echo "⚠️ Linting issues found"
          fi
          
          echo "✅ Vue.js frontend validation completed"

      # Upload test artifacts
      - name: "📊 Upload Test Results"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-vue
          path: |
            storage/test-results/
            storage/logs/
          retention-days: 14

      # Upload coverage to Codecov (optional)
      - name: "📈 Upload Coverage to Codecov"
        if: success()
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./storage/test-results/**/coverage.xml
          flags: vue,laravel,echo
          name: laravel-vue-echo-coverage
          fail_ci_if_error: false

# ============================================================================
# JOB 4: BUILD ARTIFACT
# ============================================================================
  build-artifact:
    name: "4️⃣ Build Deployment Artifact"
    runs-on: ubuntu-latest
    needs: automated-tests
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging'
    
    steps:
      - name: "📥 Checkout Code"
        uses: actions/checkout@v4

      - name: "🐘 Setup PHP"
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, pdo, pdo_mysql, redis
          tools: composer:v2

      - name: "🟢 Setup Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: "📦 Build Production Artifact"
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📦 Building Production Artifact"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          
          # Install production PHP dependencies
          composer install \
            --no-dev \
            --optimize-autoloader \
            --no-interaction \
            --no-progress \
            --prefer-dist
          
          # Install and build Vue.js frontend
          npm ci --production
          npm run build
          
          # Clean up node_modules (not needed in production)
          rm -rf node_modules
          
          # Create artifact directory
          ARTIFACT_NAME="laravel-vue-echo-${GITHUB_SHA::8}"
          mkdir -p $ARTIFACT_NAME
          
          # Copy files to artifact (excluding unnecessary files)
          rsync -av \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.env' \
            --exclude='.env.*' \
            --exclude='node_modules' \
            --exclude='tests' \
            --exclude='*.md' \
            --exclude='.editorconfig' \
            --exclude='.gitattributes' \
            --exclude='.gitignore' \
            --exclude='phpunit.xml' \
            --exclude='phpstan.neon' \
            --exclude='pint.json' \
            ./ $ARTIFACT_NAME/
          
          # Create compressed artifact
          tar -czf "${ARTIFACT_NAME}.tar.gz" $ARTIFACT_NAME/
          
          echo "✅ Artifact created: ${ARTIFACT_NAME}.tar.gz"
          echo "Artifact size: $(du -sh ${ARTIFACT_NAME}.tar.gz | cut -f1)"

      - name: "📤 Upload Artifact"
        uses: actions/upload-artifact@v4
        with:
          name: laravel-vue-echo-build-${{ github.sha }}
          path: "*.tar.gz"
          retention-days: 14

# ============================================================================
# JOB 5: DEPLOY TO STAGING
# ============================================================================
  deploy-staging:
    name: "5️⃣ Deploy to Staging"
    runs-on: ubuntu-latest
    needs: build-artifact
    if: github.ref == 'refs/heads/staging' || github.ref == 'refs/heads/develop'
    environment:
      name: staging
      url: https://staging.yourdomain.com
    
    steps:
      - name: "📥 Download Artifact"
        uses: actions/download-artifact@v4
        with:
          name: laravel-vue-echo-build-${{ github.sha }}

      - name: "🚀 Deploy to Staging Server"
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          port: ${{ secrets.STAGING_PORT || 22 }}
          script_stop: true
          script: |
            set -e
            cd /var/www/laravel-vue-staging
            
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "🚀 STAGING DEPLOYMENT STARTED"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            
            # Enable maintenance mode
            php artisan down \
              --retry=60 \
              --refresh=30 \
              --secret=maintenance-bypass-token
            
            # Backup current deployment
            BACKUP_DIR="../backups/$(date +%Y%m%d_%H%M%S)"
            mkdir -p $BACKUP_DIR
            cp -r . $BACKUP_DIR/ || true
            echo "✅ Backup created"
            
            # Pull latest code
            echo "📥 Pulling latest code..."
            git fetch origin ${{ github.ref_name }}
            git reset --hard origin/${{ github.ref_name }}
            
            # Install PHP dependencies
            echo "📦 Installing PHP dependencies..."
            composer install \
              --no-dev \
              --optimize-autoloader \
              --no-interaction \
              --prefer-dist
            
            # Install and build Vue.js frontend
            echo "🎨 Building Vue.js frontend..."
            npm ci --production
            npm run build
            rm -rf node_modules
            
            # Run database migrations
            echo "🗄️ Running database migrations..."
            php artisan migrate --force
            
            # Run staging seeders
            echo "🌱 Running staging seeders..."
            php artisan db:seed --class=StagingSeeder --force || true
            
            # Clear and cache configuration
            echo "⚡ Optimizing Laravel..."
            php artisan optimize:clear
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan event:cache
            
            # Restart services
            echo "🔄 Restarting services..."
            php artisan queue:restart || true
            
            # Restart Echo Server if using Laravel Reverb
            if [ -f "reverb.json" ]; then
              echo "🔄 Restarting Laravel Reverb..."
              php artisan reverb:restart || true
            fi
            
            # Restart PHP-FPM
            sudo systemctl reload php8.3-fpm || sudo service php8.3-fpm reload || true
            
            # Restart Supervisor (for queue workers & Echo)
            sudo supervisorctl restart all || true
            
            # Disable maintenance mode
            php artisan up
            
            echo "✅ Staging deployment completed"

      - name: "🔥 Staging Smoke Tests"
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🔥 Running Staging Smoke Tests"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          
          # Wait for deployment to settle
          sleep 15
          
          # Test main application
          echo "Testing main application..."
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" https://staging.yourdomain.com)
          if [ $HTTP_CODE -eq 200 ]; then
            echo "✅ Application is accessible (HTTP $HTTP_CODE)"
          else
            echo "❌ Application returned HTTP $HTTP_CODE"
            exit 1
          fi
          
          # Test API endpoint
          echo "Testing API endpoint..."
          curl -f -s https://staging.yourdomain.com/api/health || echo "⚠️ Health endpoint not configured"
          
          # Test Echo/WebSocket endpoint (if exposed)
          echo "Testing WebSocket endpoint..."
          if curl -f -s -o /dev/null -w "%{http_code}" https://staging.yourdomain.com/broadcasting/auth; then
            echo "✅ Broadcasting endpoint accessible"
          else
            echo "⚠️ Broadcasting endpoint not publicly accessible (this is normal)"
          fi
          
          echo "✅ Staging smoke tests completed"

# ============================================================================
# JOB 6: DEPLOY TO PRODUCTION
# ============================================================================
  deploy-production:
    name: "6️⃣ Deploy to Production"
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://yourdomain.com
      
    steps:
      - name: "⏳ Deployment Approval Check"
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "⏳ PRODUCTION DEPLOYMENT"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "This deployment requires approval in GitHub Environments"
          echo "Settings → Environments → production → Required reviewers"

      - name: "📥 Download Artifact"
        uses: actions/download-artifact@v4
        with:
          name: laravel-vue-echo-build-${{ github.sha }}

      - name: "🚀 Deploy to Production Server"
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          port: ${{ secrets.PRODUCTION_PORT || 22 }}
          script_stop: true
          command_timeout: 30m
          script: |
            set -e
            cd /var/www/laravel-vue-production
            
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "🌟 PRODUCTION DEPLOYMENT STARTED"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            
            # Create backup of current deployment
            BACKUP_DIR="../production-backups/$(date +%Y%m%d_%H%M%S)"
            mkdir -p $BACKUP_DIR
            cp -r . $BACKUP_DIR/ 2>/dev/null || true
            echo "✅ Production backup created at $BACKUP_DIR"
            
            # Enable maintenance mode with bypass
            php artisan down \
              --retry=60 \
              --refresh=30 \
              --secret=${{ secrets.MAINTENANCE_SECRET }} \
              --render="errors::503"
            
            # Pull latest code
            echo "📥 Pulling latest production code..."
            git fetch origin main
            git reset --hard origin/main
            
            # Install PHP dependencies
            echo "📦 Installing PHP dependencies..."
            composer install \
              --no-dev \
              --optimize-autoloader \
              --no-interaction \
              --prefer-dist \
              --no-progress
            
            # Install and build Vue.js frontend
            echo "🎨 Building Vue.js production assets..."
            npm ci --production
            NODE_ENV=production npm run build
            rm -rf node_modules
            
            # Run database migrations (with transaction safety)
            echo "🗄️ Running production database migrations..."
            php artisan migrate --force --isolated
            
            # Clear all caches
            echo "⚡ Clearing application cache..."
            php artisan optimize:clear
            
            # Generate new caches
            echo "📦 Building application cache..."
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan event:cache
            php artisan icons:cache || true
            
            # Regenerate API documentation if needed
            if [ -f "vendor/bin/scribe" ]; then
              echo "📚 Generating API documentation..."
              php artisan scribe:generate --force || true
            fi
            
            # Restart all services
            echo "🔄 Restarting services..."
            
            # Restart queue workers
            php artisan queue:restart
            
            # Restart Laravel Reverb if configured
            if [ -f "config/reverb.php" ]; then
              echo "🔄 Restarting Laravel Reverb WebSocket server..."
              php artisan reverb:restart || true
            fi
            
            # Restart Laravel Horizon if configured
            if [ -f "config/horizon.php" ]; then
              echo "🔄 Restarting Laravel Horizon..."
              php artisan horizon:terminate || true
            fi
            
            # Restart PHP-FPM
            echo "🔄 Reloading PHP-FPM..."
            sudo systemctl reload php8.3-fpm || sudo service php8.3-fpm reload || true
            
            # Restart Supervisor
            echo "🔄 Restarting Supervisor..."
            sudo supervisorctl restart all || true
            
            # Restart Nginx/Apache
            echo "🔄 Reloading web server..."
            sudo systemctl reload nginx || sudo systemctl reload apache2 || true
            
            # Warm up the application
            echo "🔥 Warming up application..."
            curl -s -o /dev/null http://localhost/ || true
            curl -s -o /dev/null http://localhost/api/health || true
            
            # Bring application online
            echo "🌐 Bringing application online..."
            php artisan up
            
            # Verify application is running
            echo "🔍 Verifying deployment..."
            sleep 5
            
            if curl -f -s -o /dev/null http://localhost/; then
              echo "✅ Application is running on localhost"
            else
              echo "❌ Application failed to start on localhost"
              php artisan down
              exit 1
            fi
            
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "✅ PRODUCTION DEPLOYMENT COMPLETED"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            
            # Cleanup old backups (keep last 5)
            cd /var/www/production-backups/
            ls -t | tail -n +6 | xargs -r rm -rf

      - name: "🔥 Production Smoke Tests"
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🔥 Running Production Smoke Tests"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          
          # Wait for deployment to fully settle
          sleep 20
          
          # Test main application
          echo "1. Testing main application..."
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" https://yourdomain.com)
          if [ $HTTP_CODE -eq 200 ]; then
            echo "✅ Application is accessible (HTTP $HTTP_CODE)"
          else
            echo "❌ Application returned HTTP $HTTP_CODE"
            exit 1
          fi
          
          # Test API endpoints
          echo "2. Testing API endpoints..."
          curl -f -s https://yourdomain.com/api/health || echo "⚠️ Health endpoint not available"
          
          # Test SSL certificate
          echo "3. Testing SSL certificate..."
          echo | openssl s_client -connect yourdomain.com:443 -servername yourdomain.com 2>/dev/null | openssl x509 -noout -dates || echo "⚠️ SSL check failed"
          
          # Test WebSocket connection (if using Reverb)
          echo "4. Testing WebSocket endpoint..."
          if curl -f -s -I https://yourdomain.com/broadcasting/auth 2>/dev/null | grep -q "HTTP"; then
            echo "✅ WebSocket auth endpoint accessible"
          else
            echo "ℹ️ WebSocket endpoint not directly accessible (normal if using Reverb)"
          fi
          
          # Test Vue.js assets loading
          echo "5. Testing Vue.js assets..."
          curl -f -s https://yourdomain.com/build/manifest.json > /dev/null && echo "✅ Vue.js assets accessible" || echo "⚠️ Asset manifest not found"
          
          # Test robots.txt
          echo "6. Testing robots.txt..."
          curl -f -s https://yourdomain.com/robots.txt | grep -q "Disallow" && echo "✅ robots.txt configured"
          
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✅ Production Smoke Tests Completed"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: "📢 Deployment Notification"
        if: always()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "🚀 Laravel Vue Echo Deployment - ${{ job.status }}",
              "attachments": [
                {
                  "color": "${{ job.status == 'success' && 'good' || 'danger' }}",
                  "fields": [
                    {
                      "title": "Environment",
                      "value": "Production",
                      "short": true
                    },
                    {
                      "title": "Branch",
                      "value": "${{ github.ref_name }}",
                      "short": true
                    },
                    {
                      "title": "Commit",
                      "value": "${{ github.sha }}",
                      "short": true
                    },
                    {
                      "title": "Author",
                      "value": "${{ github.actor }}",
                      "short": true
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

# ============================================================================
# END OF PIPELINE
# ============================================================================