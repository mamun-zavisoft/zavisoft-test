name: Laravel + Vue.js CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PHP_VERSION: "8.2"
  NODE_VERSION: "20"
  APP_ENV: testing
  DB_CONNECTION: mysql
  DB_HOST: 127.0.0.1
  DB_PORT: 3306
  DB_DATABASE: laravel_test
  DB_USERNAME: root
  DB_PASSWORD: secret

jobs:
  # ─────────────────────────────────────────────
  # STAGE 1 – INSTALL DEPENDENCIES
  # ─────────────────────────────────────────────
  install:
    name: "1 · Dependency Installation"
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}

      - name: Cache Node Modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: npm-${{ hashFiles('package-lock.json') }}

      - name: Install PHP deps
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Install Node deps
        run: npm ci

  # ─────────────────────────────────────────────
  # STAGE 2 – STATIC ANALYSIS & VALIDATION
  # ─────────────────────────────────────────────
  static-analysis:
    name: "2-6 · Lint / Style / Security / Architecture"
    runs-on: self-hosted
    needs: install
    steps:
      - uses: actions/checkout@v4
      - name: Restore caches
        uses: actions/cache@v4
        with: { path: vendor, key: "composer-${{ hashFiles('composer.lock') }}" }

      # PHP Syntax Validation
      - name: PHP Syntax Check
        run: find app bootstrap config database routes -name "*.php" | xargs php -l

      # Code Style
      - name: Laravel Pint (CS)
        run: ./vendor/bin/pint --test

      # Static Analysis
      - name: PHPStan / Larastan
        run: ./vendor/bin/phpstan analyse --memory-limit=512M

      # Security Scan
      - name: Composer Audit
        run: composer audit --no-interaction

      - name: npm Audit
        run: npm audit --audit-level=high

      # Architecture Validation
      - name: Deptrac (Architecture)
        run: ./vendor/bin/deptrac analyse --config-file=deptrac.yaml

      # Duplicate Code Detection
      - name: PHPCPD (Duplicate Code)
        run: ./vendor/bin/phpcpd app --min-lines=5 --min-tokens=70 || true

  # ─────────────────────────────────────────────
  # STAGE 3 – DATABASE VALIDATION
  # ─────────────────────────────────────────────
  database:
    name: "7-8 · Migration & Seeder Validation"
    runs-on: self-hosted
    needs: install
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: secret
          MYSQL_DATABASE: laravel_test
        ports: ["3306:3306"]
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-retries=5
      redis:
        image: redis:7
        ports: ["6379:6379"]
    steps:
      - uses: actions/checkout@v4
      - name: Restore caches
        uses: actions/cache@v4
        with: { path: vendor, key: "composer-${{ hashFiles('composer.lock') }}" }

      - name: Setup .env
        run: |
          cp .env.example .env.testing
          php artisan key:generate --env=testing

      - name: Validate Migrations
        run: php artisan migrate --env=testing --force --no-interaction

      - name: Validate Seeders
        run: php artisan db:seed --env=testing --force --no-interaction

  # ─────────────────────────────────────────────
  # STAGE 4 – TESTS
  # ─────────────────────────────────────────────
  tests:
    name: "9-11 · Unit / Feature / Browser Tests"
    runs-on: self-hosted
    needs: [static-analysis, database]
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: secret
          MYSQL_DATABASE: laravel_test
        ports: ["3306:3306"]
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-retries=5
      redis:
        image: redis:7
        ports: ["6379:6379"]
    steps:
      - uses: actions/checkout@v4
      - name: Restore caches
        uses: actions/cache@v4
        with: { path: vendor, key: "composer-${{ hashFiles('composer.lock') }}" }
      - uses: actions/cache@v4
        with: { path: node_modules, key: "npm-${{ hashFiles('package-lock.json') }}" }

      - name: Setup .env
        run: |
          cp .env.example .env.testing
          php artisan key:generate --env=testing
          php artisan migrate --env=testing --force

      # Unit Tests
      - name: PHPUnit Unit
        run: php artisan test --testsuite=Unit --parallel

      # Feature Tests (includes Laravel Echo / Broadcasting)
      - name: PHPUnit Feature
        run: php artisan test --testsuite=Feature --parallel

      # Browser / Integration Tests (Dusk + Vue)
      - name: Laravel Dusk + Vite Preview
        run: |
          npm run build
          php artisan serve --env=testing &
          sleep 3
          php artisan dusk --env=testing

      - name: Vue Unit Tests (Vitest)
        run: npm run test:unit -- --reporter=verbose

      - name: Upload Coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/

  # ─────────────────────────────────────────────
  # STAGE 5 – ARTIFACT BUILD
  # ─────────────────────────────────────────────
  build:
    name: "15 · Artifact Build"
    runs-on: self-hosted
    needs: tests
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    steps:
      - uses: actions/checkout@v4
      - name: Restore caches
        uses: actions/cache@v4
        with: { path: vendor, key: "composer-${{ hashFiles('composer.lock') }}" }
      - uses: actions/cache@v4
        with: { path: node_modules, key: "npm-${{ hashFiles('package-lock.json') }}" }

      - name: Build Vue assets (Vite)
        run: npm run build

      - name: Optimize Laravel
        run: |
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache
          php artisan event:cache

      - name: Create release tarball
        run: |
          tar -czf artifact.tar.gz \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='tests' \
            --exclude='.env*' \
            .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ github.sha }}
          path: artifact.tar.gz
          retention-days: 7

  # ─────────────────────────────────────────────
  # STAGE 6 – DEPLOY TO STAGING
  # ─────────────────────────────────────────────
  deploy-staging:
    name: "CD · Deploy → Staging"
    runs-on: self-hosted
    needs: build
    environment: staging
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: release-${{ github.sha }}

      - name: Deploy to Staging
        env:
          STAGING_HOST: ${{ secrets.STAGING_HOST }}
          STAGING_USER: ${{ secrets.STAGING_USER }}
          STAGING_PATH: ${{ secrets.STAGING_PATH }}
          SSH_KEY: ${{ secrets.STAGING_SSH_KEY }}
        run: |
          echo "$SSH_KEY" > /tmp/deploy_key && chmod 600 /tmp/deploy_key
          scp -i /tmp/deploy_key artifact.tar.gz $STAGING_USER@$STAGING_HOST:/tmp/
          ssh -i /tmp/deploy_key $STAGING_USER@$STAGING_HOST bash << 'EOF'
            set -e
            DEPLOY_PATH="${STAGING_PATH}"
            mkdir -p $DEPLOY_PATH/releases/$GITHUB_SHA
            tar -xzf /tmp/artifact.tar.gz -C $DEPLOY_PATH/releases/$GITHUB_SHA
            cp $DEPLOY_PATH/shared/.env $DEPLOY_PATH/releases/$GITHUB_SHA/.env
            ln -sfn $DEPLOY_PATH/releases/$GITHUB_SHA $DEPLOY_PATH/current
            cd $DEPLOY_PATH/current
            php artisan migrate --force --no-interaction
            php artisan queue:restart
            sudo systemctl reload php8.2-fpm
          EOF
          rm -f /tmp/deploy_key

  # ─────────────────────────────────────────────
  # STAGE 7 – SMOKE TEST (STAGING)
  # ─────────────────────────────────────────────
  smoke-test:
    name: "CD · Smoke Test (Staging)"
    runs-on: self-hosted
    needs: deploy-staging
    steps:
      - name: Health Check
        run: |
          curl -sf ${{ secrets.STAGING_URL }}/health || exit 1

      - name: Echo WebSocket Smoke Test
        run: |
          node -e "
            const io = require('socket.io-client');
            const socket = io('${{ secrets.STAGING_ECHO_URL }}', { timeout: 5000 });
            socket.on('connect', () => { console.log('Echo OK'); process.exit(0); });
            socket.on('connect_error', (e) => { console.error('Echo FAIL', e); process.exit(1); });
          "

      - name: API Smoke Tests
        run: |
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" ${{ secrets.STAGING_URL }}/api/ping)
          [ "$STATUS" = "200" ] || (echo "API returned $STATUS" && exit 1)

  # ─────────────────────────────────────────────
  # STAGE 8 – MANUAL APPROVAL
  # ─────────────────────────────────────────────
  approve-production:
    name: "16 · Deployment Approval"
    runs-on: self-hosted
    needs: smoke-test
    environment:
      name: production          # ← requires manual reviewer in GitHub Environments
    steps:
      - name: Approved
        run: echo "Production deployment approved by ${{ github.actor }}"

  # ─────────────────────────────────────────────
  # STAGE 9 – PRODUCTION DEPLOYMENT
  # ─────────────────────────────────────────────
  deploy-production:
    name: "17 · Production Deployment"
    runs-on: self-hosted
    needs: approve-production
    environment: production
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: release-${{ github.sha }}

      - name: Deploy to Production
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_USER: ${{ secrets.PROD_USER }}
          PROD_PATH: ${{ secrets.PROD_PATH }}
          SSH_KEY: ${{ secrets.PROD_SSH_KEY }}
        run: |
          echo "$SSH_KEY" > /tmp/deploy_key && chmod 600 /tmp/deploy_key
          scp -i /tmp/deploy_key artifact.tar.gz $PROD_USER@$PROD_HOST:/tmp/
          ssh -i /tmp/deploy_key $PROD_USER@$PROD_HOST bash << 'EOF'
            set -e
            DEPLOY_PATH="${PROD_PATH}"
            RELEASE=$DEPLOY_PATH/releases/$GITHUB_SHA
            mkdir -p $RELEASE
            tar -xzf /tmp/artifact.tar.gz -C $RELEASE
            cp $DEPLOY_PATH/shared/.env $RELEASE/.env
            ln -sfn $RELEASE $DEPLOY_PATH/current
            cd $DEPLOY_PATH/current
            php artisan down --secret="${MAINTENANCE_KEY}"
            php artisan migrate --force --no-interaction
            php artisan queue:restart
            sudo systemctl reload php8.2-fpm
            php artisan up
            # Keep last 5 releases only
            ls -dt $DEPLOY_PATH/releases/*/ | tail -n +6 | xargs rm -rf
          EOF
          rm -f /tmp/deploy_key

      - name: Production Health Check
        run: |
          sleep 5
          curl -sf ${{ secrets.PROD_URL }}/health || exit 1

      - name: Notify Deployment
        if: always()
        run: |
          curl -X POST ${{ secrets.SLACK_WEBHOOK }} \
            -H 'Content-type: application/json' \
            -d '{"text":"🚀 Production deployed: ${{ github.sha }} by ${{ github.actor }} — ${{ job.status }}"}'